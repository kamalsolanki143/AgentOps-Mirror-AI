version: "3.9"

services:
  backend:
    environment:
      - APP_ENV=production
    restart: always

  frontend:
    build:
      args:
        - NEXT_PUBLIC_API_URL=https://api.example.com
    environment:
      - NODE_ENV=production
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
